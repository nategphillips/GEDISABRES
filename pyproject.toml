[project]
name = "GEDISABRES"
version = "0.2.0"
description = "A tool for simulating the rovibronic spectra of diatomic molecules."
readme = "README.md"
requires-python = ">=3.14.0"
dependencies = [
    "hamilterm==0.1.0",
    "matplotlib==3.10.7",
    "numpy==2.3.5",
    "polars==1.35.2",
    "py3nj==0.2.2",
    "pyqtdarktheme==2.1.0",
    "pyqtgraph==0.14.0",
    "pyside6-essentials==6.10.1",
    "scipy==1.16.3",
]

[tool.basedpyright]
typeCheckingMode = "basic"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
extend-select = [
    "A",
    "ARG",
    "C4",
    "C90",
    "D",
    "E",
    "FIX",
    "I",
    "N",
    "NPY",
    "PL",
    "RET",
    "SIM",
    "TC",
    "UP",
    "W",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.uv.sources]
hamilterm = { git = "https://github.com/nategphillips/hamilterm", rev = "2e1c02500ce09c663c590104bca05d873cf3b179" }
py3nj = { git = "https://github.com/fujiisoup/py3nj", rev = "098e40e433d6c1f32b1b488519bbae40f40b812b" }

[tool.uv]
required-version = ">=0.9.10"
